---
layout: default
title: Map
permalink: /map/
leaflet: true
---

<article class="container-page">
  <div class="page-title">
    <h1>Map</h1>
  </div>
  <div id="photo-map"></div>
</article>

<script>
var photos = [
  {% for photo in site.data.photos %}
  {
    lat: {{ photo.lat }},
    lng: {{ photo.lng }},
    title: {{ photo.title | jsonify }},
    image: {{ photo.image | jsonify }},
    caption: {{ photo.caption | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

var map = L.map('photo-map').setView([20, 10], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

photos.forEach(function (p) {
  var popup = '<strong>' + p.title + '</strong>';
  if (p.image) {
    popup += '<br><img src="' + p.image + '" style="max-width:200px;max-height:150px;margin-top:6px;display:block">';
  }
  if (p.caption) {
    popup += '<br><span style="font-size:.85em;color:#555">' + p.caption + '</span>';
  }
  L.marker([p.lat, p.lng]).addTo(map).bindPopup(popup);
});
</script>
